<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" id="app-favicon" type="image/x-icon" href="/icos/2.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oravity</title>
  </head>
  <body>
    <div id="root">
      <div id="app-loader" style="display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;background:#fff;">
        <img src="/spinner/spinner.png" alt="" style="width:48px;height:48px;animation:spin 1s linear infinite;" />
      </div>
    </div>
    <style>
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @media (prefers-color-scheme: dark) {
        #app-loader { background: #0a0a0a; }
        #app-loader img { filter: invert(1); }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
