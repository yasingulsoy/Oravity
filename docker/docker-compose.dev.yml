# Oravity — Geliştirme Ortamı Altyapı Servisleri
# Başlatma: docker compose -f docker/docker-compose.dev.yml up -d

services:

  # ─── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: oravity_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oravity
      POSTGRES_PASSWORD: oravity_pass
      POSTGRES_DB: oravity_core_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oravity -d oravity_core_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oravity_dev

  # ─── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: oravity_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oravity_dev

  # ─── pgAdmin 4 ──────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: oravity_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@oravity.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oravity_dev

# ─── Named Volumes ────────────────────────────────────────────
volumes:
  postgres_data:
    name: oravity_postgres_data
  redis_data:
    name: oravity_redis_data
  pgadmin_data:
    name: oravity_pgadmin_data

# ─── Network ──────────────────────────────────────────────────
networks:
  oravity_dev:
    name: oravity_dev
    driver: bridge
